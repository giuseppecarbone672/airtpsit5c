<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione Utente - Compagnia Aerea</title>
</head>
<body>
    <h1>Registrazione Utente</h1>
    <p>Compila il modulo per registrarti al nostro sito della compagnia aerea.</p>
    
    <form action="process_registration.php" method="post">
        <label for="nome">Nome:</label><br>
        <input type="text" id="nome" name="nome" required><br><br>
        
        <label for="cognome">Cognome:</label><br>
        <input type="text" id="cognome" name="cognome" required><br><br>
        
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>
        
        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password" required><br><br>
        
        <label for="conferma_password">Conferma Password:</label><br>
        <input type="password" id="conferma_password" name="conferma_password" required><br><br>
        
        <label for="telefono">Telefono:</label><br>
        <input type="tel" id="telefono" name="telefono"><br><br>
        
        <label for="data_nascita">Data di Nascita:</label><br>
        <input type="date" id="data_nascita" name="data_nascita"><br><br>
        
        <input type="submit" value="Registrati">
    </form>
</body>
</html>
