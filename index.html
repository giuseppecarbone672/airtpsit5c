<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyWings Airlines</title>
    <link rel="stylesheet" href="./css/index.css">
</head>
<body>

    <!-- Header -->
    <header>
        <div class="logo">✈ SkyWings</div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Destinazioni</a></li>
                <li><a href="#">Offerte</a></li>
                <li><a href="#">Contatti</a></li>
            </ul>
        </nav>
    </header>

    <!-- Hero -->
    <section class="hero">
        <div class="hero-content">
            <h1>Vola verso il tuo prossimo sogno</h1>
            <p>Scopri le migliori offerte per viaggiare in tutto il mondo</p>
            <button>Prenota ora</button>
        </div>
    </section>

    <!-- Ricerca voli -->
    <section class="search">
        <h2>Cerca il tuo volo</h2>
        <form>
            <input type="text" placeholder="Partenza">
            <input type="text" placeholder="Destinazione">
            <input type="date">
            <button type="submit">Cerca</button>
        </form>
    </section>

    <!-- Destinazioni -->
    <section class="destinations">
        <h2>Destinazioni popolari</h2>
        <div class="cards">
            <div class="card">Parigi</div>
            <div class="card">New York</div>
            <div class="card">Tokyo</div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 SkyWings Airlines - Tutti i diritti riservati</p>
    </footer>

</body>
</html>
